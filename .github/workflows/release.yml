name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install
        run: |
          pip install --upgrade pip
          pip install .
          pip install pyinstaller
      
      - name: Build EXE
        shell: cmd
        run: pyinstaller --clean --onefile -n DetectorDeDuplicados --console src\detector_duplicados\cli.py
      
      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/DetectorDeDuplicados.exe